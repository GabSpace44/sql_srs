name: ci_check_code_quality
on: pull_request
jobs:
    black:
      runs-on: ubuntu-20-04
      staps:
        - uses: actions/checkout@v3
        - uses: actions/setup-python@v4
          with:
            python-version: 3.9
        - run: |
            python -m pip install --updagrade pip
            pip install black
        - run: |
            black --check --verbose .